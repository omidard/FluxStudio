<svg xmlns="http://www.w3.org/2000/svg" width="480" height="88" viewBox="0 0 480 88" role="img" aria-label="Launch Flux Studio">
  <title>Launch Flux Studio</title>

  <defs>
    <linearGradient id="fs-face" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="0.55" stop-color="#1E40AF"/>
      <stop offset="1" stop-color="#17307F"/>
    </linearGradient>
    <linearGradient id="fs-gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- the button -->
  <rect x="1" y="1" width="478" height="86" rx="14" fill="url(#fs-face)"/>
  <rect x="1" y="1" width="478" height="43" rx="14" fill="url(#fs-gloss)"/>
  <rect x="1.5" y="1.5" width="477" height="85" rx="13.5" fill="none" stroke="#FFFFFF" stroke-opacity="0.18"/>

  <!-- a faint lattice, the same one the browsers wear in their hero -->
  <g fill="#FFFFFF" fill-opacity="0.10">
    <circle cx="392" cy="20" r="1.4"/><circle cx="418" cy="20" r="1.4"/><circle cx="444" cy="20" r="1.4"/>
    <circle cx="392" cy="46" r="1.4"/><circle cx="418" cy="46" r="1.4"/><circle cx="444" cy="46" r="1.4"/>
    <circle cx="392" cy="72" r="1.4"/><circle cx="418" cy="72" r="1.4"/><circle cx="444" cy="72" r="1.4"/>
  </g>

  <!-- flask -->
  <g transform="translate(26, 25)" fill="none" stroke="#FFFFFF" stroke-width="1.75"
     stroke-linecap="round" stroke-linejoin="round">
    <g transform="scale(1.6)">
      <path d="M9 3h6M10 3v6.4L5.3 18a2 2 0 0 0 1.7 3h10a2 2 0 0 0 1.7-3L14 9.4V3"/>
      <path d="M7.6 15h8.8"/>
    </g>
  </g>

  <text x="84" y="41" fill="#FFFFFF" font-size="21" font-weight="600"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
        letter-spacing="-0.2">Launch Flux Studio</text>

  <text x="85" y="63" fill="#FFFFFF" fill-opacity="0.72" font-size="12.5"
        font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace">omidard.github.io/FluxStudio</text>

  <!-- arrow -->
  <g transform="translate(438, 36)" fill="none" stroke="#FFFFFF" stroke-width="2.1"
     stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 8h14M8 2l6 6-6 6"/>
  </g>
</svg>
